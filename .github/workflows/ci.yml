name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-standalone-mainline-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-commit-standalone-mainline:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/standalone-reliability-ux-20260713'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/standalone-reliability-ux-20260713
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            bridge/package-lock.json
      - name: Normalize patch anchors
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-standalone-mainline.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('       const finalLang', '      const finalLang'),
              ('       const queued', '      const queued'),
              ('       setMessages', '      setMessages'),
              ('"         pending:', '"        pending:'),
              ('\\n         failed:', '\\n        failed:'),
              ('\\n         sent:', '\\n        sent:'),
              ('\\n         status:', '\\n        status:'),
          ]
          for old, new in replacements:
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply standalone mainline patch
        run: python scripts/apply-standalone-mainline.py
      - name: Update outbox test contract
        run: python scripts/update-outbox-test-contract.py
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest httpx ruff
      - name: Ruff changed implementation
        shell: bash
        run: |
          files=(
            src/whatsapp_chat_system/outbox.py
            src/whatsapp_chat_system/api/v1/settings.py
            src/whatsapp_chat_system/api/v1/operations.py
            src/whatsapp_chat_system/api/v1/conversations.py
            src/whatsapp_chat_system/api/v1/accounts.py
            src/whatsapp_chat_system/standalone_api.py
            src/whatsapp_chat_system/bridge/client.py
            tests/test_accounts_api.py
          )
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
      - name: Python tests
        run: pytest -q
      - name: Web tests and build
        run: |
          npm ci --prefix web
          node --test web/tests/*.test.js
          npm run build --prefix web
      - name: Bridge tests and lint
        run: |
          npm ci --prefix bridge
          npm test --prefix bridge
          npm run lint --prefix bridge
      - name: Diff quality
        run: git diff --check
      - name: Commit verified implementation
        run: |
          git restore --worktree --staged web/dist 2>/dev/null || true
          git clean -fd web/dist 2>/dev/null || true
          git restore .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete standalone V1 and reliable outbox [SDD-P0]'
          git push origin HEAD:fix/standalone-reliability-ux-20260713
