name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest httpx ruff
      - name: Ruff changed Python files
        shell: bash
        run: |
          base="origin/${GITHUB_BASE_REF:-main}"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.py')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Python files"
            exit 0
          fi
          printf 'Checking %s\n' "${files[@]}"
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
      - name: Pytest
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci --prefix web
      - name: Tests
        run: node --test web/tests/*.test.js
      - name: Production build
        run: npm run build --prefix web

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - name: Install
        run: npm ci --prefix bridge
      - name: Tests
        run: npm test --prefix bridge
      - name: Syntax checks
        run: npm run lint --prefix bridge

  diff-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Whitespace and conflict markers
        run: git diff --check origin/${{ github.base_ref || 'main' }}...HEAD
