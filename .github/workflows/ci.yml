name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: python -m pip install uv==0.9.25 && uv sync --locked --group dev
      - name: Ruff changed Python files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/${GITHUB_BASE_REF}"
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="HEAD^"
            fi
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.py')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Python files"
            exit 0
          fi
          uv run ruff check "${files[@]}"
          uv run ruff format --check "${files[@]}"
      - name: Pytest
        run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci --prefix web
      - name: Tests
        run: node --test web/tests/*.test.js
      - name: Production build
        run: npm run build --prefix web

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - name: Install
        run: npm ci --prefix bridge
      - name: Tests
        run: npm test --prefix bridge
      - name: Syntax checks
        run: npm run lint --prefix bridge

  diff-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Whitespace and conflict markers
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/${GITHUB_BASE_REF}"
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="HEAD^"
            fi
          fi
          git diff --check "$base...HEAD"

  tauri-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - name: Install JavaScript dependencies
        run: npm ci && npm ci --prefix web
      - name: Validate Tauri shell configuration
        run: npm run tauri:validate
      - name: Build packaged frontend
        run: npm run web:build:tauri
      - name: Validate Tauri CLI
        run: npm run tauri -- --version
