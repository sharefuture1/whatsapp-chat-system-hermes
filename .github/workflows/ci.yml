name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-standalone-mainline-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose-web-mainline:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/standalone-reliability-ux-20260713'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/standalone-reliability-ux-20260713
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Normalize patch anchors
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-standalone-mainline.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('       const finalLang', '      const finalLang'),
              ('       const queued', '      const queued'),
              ('       setMessages', '      setMessages'),
              ('"         pending:', '"        pending:'),
              ('\\n         failed:', '\\n        failed:'),
              ('\\n         sent:', '\\n        sent:'),
              ('\\n         status:', '\\n        status:'),
          ]
          for old, new in replacements:
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply standalone mainline patch
        run: python scripts/apply-standalone-mainline.py
      - name: Update outbox test contract
        run: python scripts/update-outbox-test-contract.py
      - name: Web diagnostics
        shell: bash
        run: |
          set +e
          npm ci --prefix web > standalone-web.log 2>&1
          install_code=$?
          if [ "$install_code" -eq 0 ]; then
            node --test web/tests/*.test.js >> standalone-web.log 2>&1
            test_code=$?
            npm run build --prefix web >> standalone-web.log 2>&1
            build_code=$?
          else
            test_code=1
            build_code=1
          fi
          cat standalone-web.log
          if [ "$install_code" -ne 0 ] || [ "$test_code" -ne 0 ] || [ "$build_code" -ne 0 ]; then
            exit 1
          fi
      - name: Upload web diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-web-diagnostics
          path: standalone-web.log
          if-no-files-found: ignore
          retention-days: 7
