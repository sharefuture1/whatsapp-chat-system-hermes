name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-standalone-mainline:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/standalone-reliability-ux-20260713'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/standalone-reliability-ux-20260713
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            bridge/package-lock.json
      - name: Apply standalone mainline patch
        shell: bash
        run: |
          set +e
          python scripts/apply-standalone-mainline.py > standalone-apply.log 2>&1
          code=$?
          cat standalone-apply.log
          exit "$code"
      - name: Upload standalone patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-apply-diagnostics
          path: standalone-apply.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest httpx ruff
      - name: Ruff changed implementation
        shell: bash
        run: |
          files=(
            src/whatsapp_chat_system/outbox.py
            src/whatsapp_chat_system/api/v1/settings.py
            src/whatsapp_chat_system/api/v1/operations.py
            src/whatsapp_chat_system/api/v1/conversations.py
            src/whatsapp_chat_system/api/v1/accounts.py
            src/whatsapp_chat_system/standalone_api.py
            src/whatsapp_chat_system/bridge/client.py
          )
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
      - name: Python tests
        run: pytest -q
      - name: Web tests and build
        run: |
          npm ci --prefix web
          node --test web/tests/*.test.js
          npm run build --prefix web
      - name: Bridge tests and lint
        run: |
          npm ci --prefix bridge
          npm test --prefix bridge
          npm run lint --prefix bridge
      - name: Diff quality
        run: git diff --check
      - name: Commit verified implementation
        shell: bash
        run: |
          git restore --worktree --staged web/dist 2>/dev/null || true
          git clean -fd web/dist 2>/dev/null || true
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete standalone V1 and reliable outbox [SDD-P0]'
          git push origin HEAD:fix/standalone-reliability-ux-20260713

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest httpx ruff
      - name: Ruff changed Python files
        shell: bash
        run: |
          base="origin/${GITHUB_BASE_REF:-main}"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.py')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed Python files"
            exit 0
          fi
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
      - name: Pytest
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: node --test web/tests/*.test.js
      - run: npm run build --prefix web

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci --prefix bridge
      - run: npm test --prefix bridge
      - run: npm run lint --prefix bridge

  diff-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git diff --check origin/${{ github.base_ref || 'main' }}...HEAD
