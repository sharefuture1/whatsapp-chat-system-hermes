name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest httpx ruff
      - name: Ruff diagnostics
        id: ruff
        continue-on-error: true
        shell: bash
        run: |
          set +e
          ruff check src tests > ruff-report.txt 2>&1
          lint_code=$?
          ruff format --check src tests >> ruff-report.txt 2>&1
          format_code=$?
          cat ruff-report.txt
          if [ "$lint_code" -ne 0 ] || [ "$format_code" -ne 0 ]; then
            exit 1
          fi
      - name: Pytest
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pytest -q > pytest-report.txt 2>&1
          code=$?
          cat pytest-report.txt
          exit "$code"
      - name: Upload Python diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-diagnostics
          path: |
            ruff-report.txt
            pytest-report.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Python quality gate
        if: always()
        run: |
          test "${{ steps.ruff.outcome }}" = "success"
          test "${{ steps.pytest.outcome }}" = "success"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci --prefix web
      - name: Tests
        run: node --test web/tests/*.test.js
      - name: Production build
        run: npm run build --prefix web

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - name: Install
        run: npm ci --prefix bridge
      - name: Tests
        run: npm test --prefix bridge
      - name: Syntax checks
        run: npm run lint --prefix bridge

  diff-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Whitespace and conflict markers
        run: git diff --check origin/${{ github.base_ref || 'main' }}...HEAD
