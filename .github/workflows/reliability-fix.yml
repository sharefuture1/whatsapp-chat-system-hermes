name: Reliability Fix

on:
  push:
    branches:
      - fix/standalone-reliability-ux-20260713
  pull_request:

permissions:
  contents: write

concurrency:
  group: reliability-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Vientiane
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            bridge/package-lock.json

      - name: Apply approved reliability fixes
        if: github.ref == 'refs/heads/fix/standalone-reliability-ux-20260713'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, value):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(value, encoding='utf-8')

          def replace(path, old, new):
              text = read(path)
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f'patch target missing: {path}')
              write(path, text.replace(old, new, 1))

          def regex(path, pattern, replacement, sentinel):
              text = read(path)
              if sentinel in text:
                  return
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'regex patch target missing: {path}')
              write(path, updated)

          # QA-REL-001: runtime max_retries must also govern HTTP 429/5xx retries.
          replace(
              'src/whatsapp_chat_system/ai/provider.py',
              '            if error.retryable and attempt < self.settings.max_retries:\n',
              '            if error.retryable and attempt < max_retries:\n',
          )

          # API-MSG-014: stable cursor pagination for Standalone message history.
          path = 'src/whatsapp_chat_system/api/v1/conversations.py'
          replace(path, 'from datetime import datetime\n', 'from datetime import datetime, timezone\n')
          replace(path, 'from sqlalchemy import func, or_, select\n', 'from sqlalchemy import and_, func, or_, select\n')
          regex(
              path,
              r'''    @router\.get\("/conversations/\{conversation_id\}/messages"\)\n    def conversation_messages\(.*?\n        return \{\n            "conversation_id": conversation\.id,\n            "account_id": conversation\.account_id,\n            "user_id": conversation\.remote_jid,\n            "messages": messages,\n            "total_messages": len\(messages\),\n            "has_more": False,\n        \}\n''',
              '''    @router.get("/conversations/{conversation_id}/messages")
    def conversation_messages(
        conversation_id: str,
        limit: int = Query(default=80, ge=1, le=200),
        before_occurred_at: datetime | None = Query(default=None),
        before_id: str | None = Query(default=None),
        session: Session = Depends(get_session),
    ) -> dict[str, Any]:
        conversation = session.get(Conversation, conversation_id)
        if conversation is None or conversation.deleted_at is not None:
            raise HTTPException(status_code=404, detail="Conversation not found")
        if before_id and before_occurred_at is None:
            raise HTTPException(status_code=422, detail="before_id requires before_occurred_at")
        if before_occurred_at is not None and before_occurred_at.tzinfo is None:
            before_occurred_at = before_occurred_at.replace(tzinfo=timezone.utc)

        sort_time = func.coalesce(Message.occurred_at, Message.created_at)
        statement = select(Message).where(Message.conversation_id == conversation.id)
        if before_occurred_at is not None:
            cursor_clause = sort_time < before_occurred_at
            if before_id:
                cursor_clause = or_(
                    cursor_clause,
                    and_(sort_time == before_occurred_at, Message.id < before_id),
                )
            statement = statement.where(cursor_clause)

        rows = session.scalars(
            statement.order_by(sort_time.desc(), Message.id.desc()).limit(limit + 1)
        ).all()
        has_more = len(rows) > limit
        rows = rows[:limit]
        next_cursor = None
        if has_more and rows:
            oldest = rows[-1]
            next_cursor = {
                "before_occurred_at": _iso(oldest.occurred_at or oldest.created_at),
                "before_id": oldest.id,
            }
        rows.reverse()
        messages = [
            {
                "message_id": message.id,
                "platform_message_id": message.wa_message_id,
                "account_id": message.account_id,
                "conversation_id": message.conversation_id,
                "role": "assistant" if message.direction == "outbound" else "user",
                "direction": message.direction,
                "content": message.content or "",
                "message_type": message.message_type,
                "status": message.status,
                "lang": "Unknown",
                "timestamp": _timestamp(message.occurred_at or message.created_at),
                "occurred_at": _iso(message.occurred_at),
                "created_at": _iso(message.created_at),
            }
            for message in rows
        ]
        total = session.scalar(
            select(func.count(Message.id)).where(Message.conversation_id == conversation.id)
        ) or 0
        return {
            "conversation_id": conversation.id,
            "account_id": conversation.account_id,
            "user_id": conversation.remote_jid,
            "messages": messages,
            "total_messages": total,
            "has_more": has_more,
            "next_cursor": next_cursor,
        }
''',
              'before_occurred_at: datetime | None',
          )
          replace(path, '        conversation.deleted_at = datetime.utcnow()\n', '        conversation.deleted_at = datetime.now(timezone.utc)\n')
          replace(path, '        now = datetime.utcnow()\n', '        now = datetime.now(timezone.utc)\n')

          # UX-CHAT-021: local timezone grouping and older-message loading for V1.
          path = 'web/src/components/ChatPane.jsx'
          replace(
              path,
              "import { fmtClock } from '../format'\n",
              "import { fmtClock } from '../format'\nimport { formatChatDay, localDayKey } from '../dateTime'\n",
          )
          regex(
              path,
              r'''function dayKey\(ts\) \{.*?\n\}\n\nfunction formatDay\(ts, t\) \{.*?\n\}\n''',
              '''function dayKey(ts) {
  return localDayKey(ts)
}

function formatDay(ts, t) {
  return formatChatDay(ts, t)
}
''',
              'return formatChatDay(ts, t)',
          )
          replace(path, '  const deltaCursorRef = useRef(0)\n', '  const deltaCursorRef = useRef(0)\n  const standaloneCursorRef = useRef(null)\n')
          replace(
              path,
              '''    const endpoint = standalone && conversationId
      ? `/v1/conversations/${encodeURIComponent(conversationId)}/messages?limit=${pageSize}`
      : `/conversations/${encodeURIComponent(targetUserId)}?page=${p}&page_size=${pageSize}`
''',
              '''    const cursor = standalone && appendOlder ? standaloneCursorRef.current : null
    const cursorQuery = cursor
      ? `&before_occurred_at=${encodeURIComponent(cursor.before_occurred_at)}&before_id=${encodeURIComponent(cursor.before_id)}`
      : ''
    const endpoint = standalone && conversationId
      ? `/v1/conversations/${encodeURIComponent(conversationId)}/messages?limit=${pageSize}${cursorQuery}`
      : `/conversations/${encodeURIComponent(targetUserId)}?page=${p}&page_size=${pageSize}`
''',
          )
          replace(
              path,
              '''    setHasMore(standalone ? false : Boolean(res.has_more))
    setTotal(res.total_messages || 0)
''',
              '''    if (standalone) standaloneCursorRef.current = res.next_cursor || null
    setHasMore(Boolean(res.has_more))
    setTotal(res.total_messages || 0)
''',
          )
          replace(path, '    deltaCursorRef.current = 0\n', '    deltaCursorRef.current = 0\n    standaloneCursorRef.current = null\n')

          # UX-APP-015: one failed migration data source must not blank the inbox.
          path = 'web/src/App.jsx'
          regex(
              path,
              r'''  const fetchConversationsPage = useCallback\(async \(page\) => \{.*?\n  \}, \[\]\)\n''',
              '''  const fetchConversationsPage = useCallback(async (page) => {
    const results = await Promise.allSettled([
      api.get(`/conversations?page=${page}&page_size=${PAGE_SIZE}`),
      api.get(`/contacts?page=1&page_size=500`),
      api.get(`/v1/conversations?platform=all&account_id=all&limit=200`),
      api.get('/v1/contacts?platform=all&account_id=all&limit=500'),
    ])
    if (results.every(result => result.status === 'rejected')) throw results[0].reason
    const valueOr = (result, fallback) => result.status === 'fulfilled' ? result.value : fallback
    const legacyRes = valueOr(results[0], { items: [], total: 0, has_more: false })
    const legacyContactsRes = valueOr(results[1], { items: [] })
    const standaloneRes = valueOr(results[2], { items: [], available_accounts: [] })
    const contactsRes = valueOr(results[3], { items: [] })
    const inbox = buildInbox({
      legacy: legacyRes.items || [],
      standalone: standaloneRes.items || [],
      standaloneAccounts: standaloneRes.available_accounts || accountsRef.current || [],
    })
    return {
      items: inbox.conversations,
      contacts: buildContacts({
        legacy: legacyContactsRes.items || [],
        standalone: contactsRes.items || [],
        accounts: inbox.accounts,
      }),
      accounts: inbox.accounts,
      legacyTotal: Number(legacyRes.total) || 0,
      has_more: Boolean(legacyRes.has_more),
      page,
    }
  }, [])
''',
              'const results = await Promise.allSettled([',
          )
          replace(
              path,
              '''        const convRes = await fetchConversationsPage(1)
        const dashboardRes = await api.get('/dashboard')
        return { convRes, dashboardRes }
''',
              '''        const [convRes, dashboardRes] = await Promise.all([
          fetchConversationsPage(1),
          api.get('/dashboard').catch(() => null),
        ])
        return { convRes, dashboardRes }
''',
          )
          replace(path, '        setDashboard(dashboardRes)\n', '        if (dashboardRes) setDashboard(dashboardRes)\n')
          regex(
              path,
              r'''  const refreshSettings = useCallback\(async \(\) => \{.*?\n  \}, \[\]\)\n''',
              '''  const refreshSettings = useCallback(async () => {
    const [settingsResult, aiResult] = await Promise.allSettled([
      api.get('/settings'),
      api.get('/v1/ai/settings'),
    ])
    if (settingsResult.status === 'fulfilled') setSettings(settingsResult.value)
    if (aiResult.status === 'fulfilled') setApiSettings(aiResult.value)
  }, [])
''',
              'const [settingsResult, aiResult] = await Promise.allSettled([',
          )
          replace(
              path,
              '''          setSelectedName('')
          return ''
        })
''',
              '''          return prev
        })
''',
          )
          replace(
              path,
              '''    } catch {}
  }, [pinned, refreshWorkspace])
''',
              '''    } catch (error) {
      setPinned(prev => {
        const rolledBack = isPinned
          ? [userId, ...prev.filter(item => item !== userId)]
          : prev.filter(item => item !== userId)
        localStorage.setItem(PIN_KEY, JSON.stringify(rolledBack))
        return rolledBack
      })
      showError(error)
    }
  }, [pinned, refreshWorkspace])
''',
          )

          write('web/src/dateTime.js', '''function fromTimestamp(timestampSeconds) {
  return new Date(Number(timestampSeconds || 0) * 1000)
}

export function localDayKey(timestampSeconds) {
  const date = fromTimestamp(timestampSeconds)
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`
}

export function formatChatDay(timestampSeconds, t, now = new Date()) {
  const yesterday = new Date(now)
  yesterday.setDate(now.getDate() - 1)
  if (localDayKey(timestampSeconds) === localDayKey(now.getTime() / 1000)) return t('today')
  if (localDayKey(timestampSeconds) === localDayKey(yesterday.getTime() / 1000)) return t('yesterday')
  return fromTimestamp(timestampSeconds).toLocaleDateString()
}
''')

          write('web/tests/dateTime.test.js', '''import assert from 'node:assert/strict'
import test from 'node:test'
import { formatChatDay, localDayKey } from '../src/dateTime.js'

test('chat dates use the browser timezone rather than UTC', () => {
  assert.equal(localDayKey(Date.parse('2026-07-13T17:30:00Z') / 1000), '2026-07-14')
})

test('chat dates expose localized today and yesterday labels', () => {
  const t = key => ({ today: '今天', yesterday: '昨天' })[key]
  const now = new Date('2026-07-14T09:00:00+07:00')
  assert.equal(formatChatDay(Date.parse('2026-07-14T01:00:00+07:00') / 1000, t, now), '今天')
  assert.equal(formatChatDay(Date.parse('2026-07-13T20:00:00+07:00') / 1000, t, now), '昨天')
})
''')

          test_path = 'tests/test_ai_provider.py'
          tests = read(test_path)
          marker = 'def test_provider_uses_runtime_retry_override_for_http_errors():'
          if marker not in tests:
              tests += '''\n\n\ndef test_provider_uses_runtime_retry_override_for_http_errors():
    class RuntimeSettings:
        effective_base_url = 'https://wendingai.future1.us/v1'
        effective_api_key = 'unit-test-secret'
        effective_timeout = 2
        effective_retries = 2

    session = _FakeSession([_FakeResponse(500) for _ in range(3)])
    provider = WendingAIProvider(
        AISettings(api_key='unit-test-secret', max_retries=0),
        session=session,
        sleep=lambda _: None,
    )
    provider.set_runtime_manager(RuntimeSettings())
    with pytest.raises(AIProviderError) as caught:
        provider.chat(model='m', messages=[])
    assert session.calls == 3
    assert caught.value.code == 'upstream_error'
'''
              write(test_path, tests)

          write('tests/test_v1_conversation_pagination.py', '''from __future__ import annotations

from datetime import datetime, timedelta, timezone
from fastapi import FastAPI
from fastapi.testclient import TestClient
from sqlalchemy import create_engine
from sqlalchemy.orm import sessionmaker
from sqlalchemy.pool import StaticPool

from whatsapp_chat_system.api.v1.conversations import create_conversations_router
from whatsapp_chat_system.db import Base
from whatsapp_chat_system.db.models import Contact, Conversation, Message, WhatsAppAccount


def build_client():
    engine = create_engine('sqlite+pysqlite://', connect_args={'check_same_thread': False}, poolclass=StaticPool)
    Base.metadata.create_all(engine)
    factory = sessionmaker(bind=engine, expire_on_commit=False)
    with factory() as session:
        account = WhatsAppAccount(name='WA1', session_ref='session-wa1')
        session.add(account); session.flush()
        contact = Contact(account_id=account.id, remote_jid='100@s.whatsapp.net')
        session.add(contact); session.flush()
        conversation = Conversation(account_id=account.id, contact_id=contact.id, remote_jid=contact.remote_jid)
        session.add(conversation); session.flush()
        base = datetime(2026, 7, 13, 10, 0, tzinfo=timezone.utc)
        for index in range(5):
            session.add(Message(account_id=account.id, conversation_id=conversation.id, contact_id=contact.id, direction='inbound', content=f'message-{index}', status='received', occurred_at=base + timedelta(minutes=index)))
        session.commit()
        conversation_id = conversation.id
    app = FastAPI(); app.include_router(create_conversations_router(factory))
    return TestClient(app), conversation_id


def test_cursor_paginates_without_overlap():
    client, conversation_id = build_client()
    first = client.get(f'/api/v1/conversations/{conversation_id}/messages', params={'limit': 2}).json()
    assert [item['content'] for item in first['messages']] == ['message-3', 'message-4']
    assert first['total_messages'] == 5 and first['has_more'] is True
    second = client.get(f'/api/v1/conversations/{conversation_id}/messages', params={'limit': 2, **first['next_cursor']}).json()
    assert [item['content'] for item in second['messages']] == ['message-1', 'message-2']
    third = client.get(f'/api/v1/conversations/{conversation_id}/messages', params={'limit': 2, **second['next_cursor']}).json()
    assert [item['content'] for item in third['messages']] == ['message-0']
    assert third['has_more'] is False and third['next_cursor'] is None
''')

          changelog = read('docs/CHANGELOG_AGENT.md')
          marker = 'Standalone 可靠性与聊天体验修复（Implemented）'
          if marker not in changelog:
              block = '''\n\n## 2026-07-13：Standalone 可靠性与聊天体验修复（Implemented）\n\n- 修复运行时 AI HTTP 重试配置、V1 历史消息 cursor 分页、迁移期数据源降级与本地时区日期分组。\n- 新增 Python/Web 回归测试和 GitHub Actions 三端质量门禁。\n'''
              changelog = changelog.replace('# CHANGELOG_AGENT.md — Agent 变更记录', '# CHANGELOG_AGENT.md — Agent 变更记录' + block, 1)
              write('docs/CHANGELOG_AGENT.md', changelog)
          PY

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest

      - name: Python tests
        run: pytest -q

      - name: Web tests and production build
        run: |
          npm ci --prefix web
          node --test web/tests/*.test.js
          npm run build --prefix web

      - name: Bridge tests and lint
        run: |
          npm ci --prefix bridge
          npm test --prefix bridge
          npm run lint --prefix bridge

      - name: Diff quality
        run: git diff --check

      - name: Commit tested fixes
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix/standalone-reliability-ux-20260713'
        shell: bash
        run: |
          git restore --worktree --staged web/dist 2>/dev/null || true
          git clean -fd web/dist 2>/dev/null || true
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src web tests docs
          git commit -m 'fix: improve standalone reliability and chat UX [QA-001]'
          git push
