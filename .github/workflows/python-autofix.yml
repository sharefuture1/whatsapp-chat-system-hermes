name: Python Autofix

on:
  push:
    branches:
      - fix/standalone-reliability-ux-20260713

permissions:
  contents: write

concurrency:
  group: python-autofix-reliability
  cancel-in-progress: true

jobs:
  ruff-autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/standalone-reliability-ux-20260713
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Fix and format changed Python files
        run: |
          files=(
            src/whatsapp_chat_system/ai/provider.py
            src/whatsapp_chat_system/api/v1/conversations.py
            src/whatsapp_chat_system/standalone_api.py
            tests/test_ai_provider.py
            tests/test_standalone_security.py
            tests/test_v1_conversation_pagination.py
          )
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
          git diff --check
      - name: Commit formatting fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/whatsapp_chat_system/ai/provider.py \
            src/whatsapp_chat_system/api/v1/conversations.py \
            src/whatsapp_chat_system/standalone_api.py \
            tests/test_ai_provider.py \
            tests/test_standalone_security.py \
            tests/test_v1_conversation_pagination.py
          git commit -m 'style: apply Ruff to reliability fixes'
          git push origin HEAD:fix/standalone-reliability-ux-20260713
