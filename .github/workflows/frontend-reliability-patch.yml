name: Frontend Reliability Patch

on:
  push:
    branches:
      - fix/standalone-reliability-ux-20260713

permissions:
  contents: write

concurrency:
  group: frontend-reliability-patch
  cancel-in-progress: true

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/standalone-reliability-ux-20260713
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply targeted frontend patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, value):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(value, encoding='utf-8')

          def replace(path, old, new, sentinel=None):
              text = read(path)
              if sentinel and sentinel in text:
                  return
              if old not in text:
                  raise RuntimeError(f'patch target missing: {path}: {old[:80]!r}')
              write(path, text.replace(old, new, 1))

          def regex(path, pattern, replacement, sentinel):
              text = read(path)
              if sentinel in text:
                  return
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'regex patch target missing: {path}')
              write(path, updated)

          chat = 'web/src/components/ChatPane.jsx'
          replace(
              chat,
              "import { fmtClock } from '../format'\n",
              "import { fmtClock } from '../format'\nimport { formatChatDay, localDayKey } from '../dateTime'\n",
              "from '../dateTime'",
          )
          regex(
              chat,
              r"function dayKey\(ts\) \{.*?\n\}\n\nfunction formatDay\(ts, t\) \{.*?\n\}\n",
              "function dayKey(ts) {\n  return localDayKey(ts)\n}\n\nfunction formatDay(ts, t) {\n  return formatChatDay(ts, t)\n}\n",
              'return formatChatDay(ts, t)',
          )
          replace(
              chat,
              '  const deltaCursorRef = useRef(0)\n',
              '  const deltaCursorRef = useRef(0)\n  const standaloneCursorRef = useRef(null)\n  const standalonePagingStartedRef = useRef(false)\n',
              'standalonePagingStartedRef',
          )
          replace(
              chat,
              """    const endpoint = standalone && conversationId
      ? `/v1/conversations/${encodeURIComponent(conversationId)}/messages?limit=${pageSize}`
      : `/conversations/${encodeURIComponent(targetUserId)}?page=${p}&page_size=${pageSize}`
""",
              """    const cursor = standalone && appendOlder ? standaloneCursorRef.current : null
    const cursorQuery = cursor
      ? `&before_occurred_at=${encodeURIComponent(cursor.before_occurred_at)}&before_id=${encodeURIComponent(cursor.before_id)}`
      : ''
    const endpoint = standalone && conversationId
      ? `/v1/conversations/${encodeURIComponent(conversationId)}/messages?limit=${pageSize}${cursorQuery}`
      : `/conversations/${encodeURIComponent(targetUserId)}?page=${p}&page_size=${pageSize}`
""",
              'const cursorQuery = cursor',
          )
          replace(
              chat,
              """    setHasMore(standalone ? false : Boolean(res.has_more))
    setTotal(res.total_messages || 0)
""",
              """    if (standalone) {
      if (appendOlder) standalonePagingStartedRef.current = true
      if (appendOlder || !standalonePagingStartedRef.current) {
        standaloneCursorRef.current = res.next_cursor || null
        setHasMore(Boolean(res.has_more))
      }
    } else {
      setHasMore(Boolean(res.has_more))
    }
    setTotal(res.total_messages || 0)
""",
              'standaloneCursorRef.current = res.next_cursor',
          )
          replace(
              chat,
              '    deltaCursorRef.current = 0\n',
              '    deltaCursorRef.current = 0\n    standaloneCursorRef.current = null\n    standalonePagingStartedRef.current = false\n',
              'standalonePagingStartedRef.current = false',
          )

          app = 'web/src/App.jsx'
          regex(
              app,
              r"  const fetchConversationsPage = useCallback\(async \(page\) => \{.*?\n  \}, \[\]\)\n",
              """  const fetchConversationsPage = useCallback(async (page) => {
    const results = await Promise.allSettled([
      api.get(`/conversations?page=${page}&page_size=${PAGE_SIZE}`),
      api.get('/contacts?page=1&page_size=500'),
      api.get('/v1/conversations?platform=all&account_id=all&limit=200'),
      api.get('/v1/contacts?platform=all&account_id=all&limit=500'),
    ])
    if (results.every(result => result.status === 'rejected')) throw results[0].reason
    const valueOr = (result, fallback) => result.status === 'fulfilled' ? result.value : fallback
    const legacyRes = valueOr(results[0], { items: [], total: 0, has_more: false })
    const legacyContactsRes = valueOr(results[1], { items: [] })
    const standaloneRes = valueOr(results[2], { items: [], available_accounts: [] })
    const contactsRes = valueOr(results[3], { items: [] })
    const inbox = buildInbox({
      legacy: legacyRes.items || [],
      standalone: standaloneRes.items || [],
      standaloneAccounts: standaloneRes.available_accounts || accountsRef.current || [],
    })
    return {
      items: inbox.conversations,
      contacts: buildContacts({
        legacy: legacyContactsRes.items || [],
        standalone: contactsRes.items || [],
        accounts: inbox.accounts,
      }),
      accounts: inbox.accounts,
      legacyTotal: Number(legacyRes.total) || 0,
      has_more: Boolean(legacyRes.has_more),
      page,
    }
  }, [])
""",
              'const results = await Promise.allSettled([',
          )
          replace(
              app,
              """        const convRes = await fetchConversationsPage(1)
        const dashboardRes = await api.get('/dashboard')
        return { convRes, dashboardRes }
""",
              """        const [convRes, dashboardRes] = await Promise.all([
          fetchConversationsPage(1),
          api.get('/dashboard').catch(() => null),
        ])
        return { convRes, dashboardRes }
""",
              "api.get('/dashboard').catch(() => null)",
          )
          replace(
              app,
              '        setDashboard(dashboardRes)\n',
              '        if (dashboardRes) setDashboard(dashboardRes)\n',
              'if (dashboardRes) setDashboard(dashboardRes)',
          )
          replace(
              app,
              """          setSelectedName('')
          return ''
        })
""",
              """          return prev
        })
""",
              None,
          )
          regex(
              app,
              r"  const refreshSettings = useCallback\(async \(\) => \{.*?\n  \}, \[\]\)\n",
              """  const refreshSettings = useCallback(async () => {
    const [settingsResult, aiResult] = await Promise.allSettled([
      api.get('/settings'),
      api.get('/v1/ai/settings'),
    ])
    if (settingsResult.status === 'fulfilled') setSettings(settingsResult.value)
    if (aiResult.status === 'fulfilled') setApiSettings(aiResult.value)
    if (settingsResult.status === 'rejected' && aiResult.status === 'rejected') {
      throw settingsResult.reason
    }
  }, [])
""",
              'const [settingsResult, aiResult] = await Promise.allSettled([',
          )
          replace(
              app,
              """    } catch {}
  }, [pinned, refreshWorkspace])
""",
              """    } catch (error) {
      setPinned(prev => {
        const rolledBack = isPinned
          ? [userId, ...prev.filter(item => item !== userId)]
          : prev.filter(item => item !== userId)
        localStorage.setItem(PIN_KEY, JSON.stringify(rolledBack))
        return rolledBack
      })
      showError(error)
    }
  }, [pinned, refreshWorkspace])
""",
              'const rolledBack = isPinned',
          )

          write('web/src/dateTime.js', """function dateParts(date, timeZone) {
  const formatter = new Intl.DateTimeFormat('en', {
    ...(timeZone ? { timeZone } : {}),
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
  })
  const parts = Object.fromEntries(
    formatter.formatToParts(date)
      .filter(part => part.type !== 'literal')
      .map(part => [part.type, part.value]),
  )
  return `${parts.year}-${parts.month}-${parts.day}`
}

export function localDayKey(timestampSeconds, timeZone) {
  return dateParts(new Date(Number(timestampSeconds || 0) * 1000), timeZone)
}

export function formatChatDay(timestampSeconds, t, now = new Date(), timeZone) {
  const yesterday = new Date(now)
  yesterday.setDate(now.getDate() - 1)
  const key = localDayKey(timestampSeconds, timeZone)
  if (key === dateParts(now, timeZone)) return t('today')
  if (key === dateParts(yesterday, timeZone)) return t('yesterday')
  return new Date(Number(timestampSeconds || 0) * 1000).toLocaleDateString()
}
""")
          write('web/tests/dateTime.test.js', """import assert from 'node:assert/strict'
import test from 'node:test'

import { formatChatDay, localDayKey } from '../src/dateTime.js'

test('day key respects the requested browser timezone', () => {
  const timestamp = Date.parse('2026-07-13T17:30:00Z') / 1000
  assert.equal(localDayKey(timestamp, 'Asia/Vientiane'), '2026-07-14')
  assert.equal(localDayKey(timestamp, 'UTC'), '2026-07-13')
})

test('chat day returns localized today and yesterday labels', () => {
  const t = key => ({ today: '今天', yesterday: '昨天' })[key]
  const now = new Date('2026-07-14T09:00:00+07:00')
  assert.equal(
    formatChatDay(Date.parse('2026-07-14T01:00:00+07:00') / 1000, t, now, 'Asia/Vientiane'),
    '今天',
  )
  assert.equal(
    formatChatDay(Date.parse('2026-07-13T20:00:00+07:00') / 1000, t, now, 'Asia/Vientiane'),
    '昨天',
  )
})
""")
          PY
      - name: Test and build web
        run: |
          npm ci --prefix web
          node --test web/tests/*.test.js
          npm run build --prefix web
          git diff --check
      - name: Commit tested frontend fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/src/App.jsx web/src/components/ChatPane.jsx web/src/dateTime.js web/tests/dateTime.test.js
          git commit -m 'fix(web): improve standalone pagination and migration resilience [UX-APP-015]'
          git push origin HEAD:fix/standalone-reliability-ux-20260713
